server.port=8080

# SQL Server — dùng biến môi trường cho password không hardcode vào source
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS:1433;databaseName=cosmetics_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=beautyapp
spring.datasource.password=${DB_PASSWORD:Beauty@2024!}
spring.datasource.driverClassName=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.use_nationalized_character_data=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
